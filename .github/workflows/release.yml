name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --features "all-parsers,cli,archive,download,tui,live,ioc-enrich" --all
      - name: Clippy
        run: cargo clippy --features "all-parsers,cli,archive,download,tui,live,ioc-enrich" -- -D warnings
      - name: Check formatting
        run: cargo fmt -- --check

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Static CRT (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release
        run: cargo build --release --features "all-parsers,cli,archive,download,tui,live,ioc-enrich" --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/muninn${{ matrix.ext }}" "muninn-${{ matrix.suffix }}${{ matrix.ext }}"
          cp "muninn-${{ matrix.suffix }}${{ matrix.ext }}" "muninn-${{ steps.version.outputs.tag }}-${{ matrix.suffix }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: muninn-${{ matrix.suffix }}
          path: |
            muninn-${{ matrix.suffix }}${{ matrix.ext }}
            muninn-${{ steps.version.outputs.tag }}-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package SIGMA rules
        run: cd sigma_rules && zip -r ../sigma_rules.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/muninn-linux-amd64/muninn-linux-amd64
            artifacts/muninn-linux-amd64/muninn-${{ github.ref_name }}-linux-amd64
            artifacts/muninn-windows-amd64/muninn-windows-amd64.exe
            artifacts/muninn-windows-amd64/muninn-${{ github.ref_name }}-windows-amd64.exe
            sigma_rules.zip
