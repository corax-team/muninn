title: Certutil Used for File Download
id: e19d4db0-1e22-4f0a-8e92-example003
status: stable
description: Detects certutil.exe being used to download files from the internet, a common LOLBin technique.
author: Muninn Example
date: 2024/01/15
references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/#/execute
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\certutil.exe'
    CommandLine|contains|all:
      - 'urlcache'
      - '-f'
  condition: selection
falsepositives:
  - Legitimate certificate operations
level: critical
tags:
  - attack.command_and_control
  - attack.t1105
