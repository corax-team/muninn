title: Whoami Command Execution
id: e19d4db0-1e22-4f0a-8e92-example001
status: stable
description: Detects the execution of whoami, which is often used by attackers after gaining initial access to identify the current user context.
author: Muninn Example
date: 2024/01/15
references:
  - https://attack.mitre.org/techniques/T1033/
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains: 'whoami'
  condition: selection
falsepositives:
  - Legitimate admin scripts
  - System inventory tools
level: medium
tags:
  - attack.discovery
  - attack.t1033
