logsource:
    product: aws
    service: cloudtrail
detection:
    selection:
        eventSource: 'iam.amazonaws.com'
        eventName:
            - 'ListUsers'
            - 'ListRoles'
            - 'GetAccountAuthorizationDetails'
    filter_known_automation:
        userIdentity.arn|contains:
            - 'AWSServiceRole'
    condition: selection and not filter_known_automation
falsepositives:
    - Legitimate IAM audit scripts
    - AWS Config or Security Hub scans
level: medium
