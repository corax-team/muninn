    - attack.t1059.004           # Command and Scripting Interpreter: Unix Shell
logsource:
    product: linux
    category: process_creation
detection:
    selection:
        Image|endswith:
            - '/curl'
            - '/wget'
        CommandLine|contains:
            - 'http'
            - 'ftp'
    selection_pipe:
        CommandLine|contains:
            - '| bash'
            - '| sh'
    condition: selection and selection_pipe
falsepositives:
    - Legitimate software installation scripts (e.g., install.sh | bash)
    - CI/CD pipelines
level: medium
