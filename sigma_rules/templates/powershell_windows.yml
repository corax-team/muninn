title: TODO — Suspicious PowerShell Activity
id: 00000000-0000-0000-0000-000000000000  # Replace: uuidgen
status: experimental
description: |
    Detects suspicious PowerShell script execution containing [pattern/technique].
    This is commonly observed in [malware family / attack campaign].
references:
    - https://example.com/threat-research
    - https://attack.mitre.org/techniques/T1059/001/
author: Your Name (@handle)
date: 2026-01-01
tags:
    - attack.execution
    - attack.t1059.001           # Command and Scripting Interpreter: PowerShell
logsource:
    product: windows
    category: ps_script           # ps_script (ScriptBlock 4104) or ps_module
    # service: powershell         # Alternative: Windows PowerShell channel
detection:
    selection:
        ScriptBlockText|contains:
            - 'Invoke-Suspicious'
            - 'DownloadString'
            - 'FromBase64String'
    filter_noise:
        ScriptBlockText|contains:
            - '# Copyright'       # Legitimate signed scripts
    condition: selection and not filter_noise
falsepositives:
    - Legitimate administrative PowerShell scripts
    - Third-party management tools
level: high
