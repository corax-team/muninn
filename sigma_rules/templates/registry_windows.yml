title: TODO — Registry Modification Detection
id: 00000000-0000-0000-0000-000000000000  # Replace: uuidgen
status: experimental
description: |
    Detects suspicious registry modification targeting [key/value] used for [persistence/evasion/etc].
    [Threat context and why this modification is suspicious].
references:
    - https://example.com/threat-research
    - https://attack.mitre.org/techniques/TXXXX/
author: Your Name (@handle)
date: 2026-01-01
tags:
    - attack.persistence          # or defense-evasion
    - attack.t1547.001            # Boot or Logon Autostart Execution: Registry Run Keys
logsource:
    product: windows
    category: registry_set        # registry_set, registry_add, registry_delete, registry_event
detection:
    selection:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'
        Details|contains:
            - 'suspicious_value'
    filter_legitimate:
        Image|endswith:
            - '\legitimate_installer.exe'
    condition: selection and not filter_legitimate
falsepositives:
    - Legitimate software installation
    - System updates
level: medium
