title: Network Connection To Public IP Address
id: c0a8f7d2-9e3b-4a1f-b5c6-d7e8f9012345
status: experimental
description: |
    Detects outbound network connections to public (non-RFC1918, non-loopback) IP addresses.
    Useful for identifying potential C2 communications, data exfiltration, or unauthorized external connections.
    Review the destination IP, port, and initiating process to determine if the connection is legitimate.
author: Corax Security
date: 2026/03/26
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        EventID: 3
    filter_private_dest:
        DestinationIp|startswith:
            - '10.'
            - '192.168.'
            - '172.16.'
            - '172.17.'
            - '172.18.'
            - '172.19.'
            - '172.20.'
            - '172.21.'
            - '172.22.'
            - '172.23.'
            - '172.24.'
            - '172.25.'
            - '172.26.'
            - '172.27.'
            - '172.28.'
            - '172.29.'
            - '172.30.'
            - '172.31.'
    filter_loopback:
        DestinationIp|startswith:
            - '127.'
            - '0.'
            - '169.254.'
    filter_multicast:
        DestinationIp|startswith:
            - '224.'
            - '225.'
            - '226.'
            - '227.'
            - '228.'
            - '229.'
            - '230.'
            - '231.'
            - '232.'
            - '233.'
            - '234.'
            - '235.'
            - '236.'
            - '237.'
            - '238.'
            - '239.'
            - '255.255.255.255'
    filter_ipv6_local:
        DestinationIp|startswith:
            - '::1'
            - 'fe80:'
            - 'fc00:'
            - 'fd'
    condition: selection and not filter_private_dest and not filter_loopback and not filter_multicast and not filter_ipv6_local
fields:
    - Image
    - DestinationIp
    - DestinationPort
    - User
    - Computer
level: low
tags:
    - attack.command_and_control
    - attack.t1071
    - attack.exfiltration
    - attack.t1041
