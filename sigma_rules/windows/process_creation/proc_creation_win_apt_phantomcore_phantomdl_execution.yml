title: PhantomCore PhantomDL Go Downloader Execution
id: 9c4b8e02-a5d3-4f0b-c6e2-b4f8d7a10c23
status: test
description: |
    Detects execution patterns associated with PhantomDL (PhantomGoDownloader), a Go-based
    first-stage downloader used by PhantomCore (Head Mare). The binary is typically dropped
    in user-writable directories with names mimicking legitimate software (update.exe,
    svchost.exe, RuntimeBroker.exe) and reaches out to C2 to fetch PhantomRAT.
references:
    - https://securelist.com/head-mare-hacktivists/113555/
    - https://www.facct.ru/blog/phantomcore/
author: Muninn Project
date: 2026-03-27
tags:
    - attack.execution
    - attack.defense-evasion
    - attack.t1036.005
    - attack.t1059
logsource:
    category: process_creation
    product: windows
detection:
    selection_masquerade_names:
        Image|endswith:
            - '\update.exe'
            - '\svchost.exe'
            - '\RuntimeBroker.exe'
            - '\SecurityHealthService.exe'
            - '\MicrosoftEdgeUpdate.exe'
            - '\OneDriveSync.exe'
            - '\taskhostw.exe'
            - '\dllhost.exe'
            - '\conhost.exe'
            - '\csrss.exe'
            - '\smss.exe'
    selection_user_writable_path:
        Image|contains:
            - '\AppData\Roaming\'
            - '\AppData\Local\Temp\'
            - '\AppData\Local\Microsoft\'
            - '\ProgramData\'
            - '\Users\Public\'
            - '\Windows\Temp\'
    filter_legitimate:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Program Files\'
            - 'C:\Program Files (x86)\'
    condition: selection_masquerade_names and selection_user_writable_path and not filter_legitimate
falsepositives:
    - Legitimate software updates placed in AppData by design
    - Some portable applications
level: high
