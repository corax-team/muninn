title: PhantomCore Sliver C2 Implant Indicators
id: be2def10-cde1-4b8d-e4a0-dcbafef98ea1
status: test
description: |
    Detects process creation patterns associated with Sliver C2 framework implants,
    which PhantomCore (Head Mare) has used in later campaigns alongside their custom
    PhantomRAT tooling. Sliver implants often spawn from unusual locations and may
    inject into or spawn common Windows processes.
references:
    - https://securelist.com/head-mare-hacktivists/113555/
    - https://github.com/BishopFox/sliver
    - https://www.cybereason.com/blog/sliver-c2-leveraged-by-many-threat-actors
author: Muninn Project
date: 2026-03-27
tags:
    - attack.command-and-control
    - attack.execution
    - attack.t1059
    - attack.t1071.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_sliver_default:
        CommandLine|contains:
            - '--mtls'
            - '--wg'
            - '--dns'
            - '--http'
            - '--named-pipe'
            - 'sliver'
    selection_suspicious_spawn:
        ParentImage|contains:
            - '\AppData\Local\Temp\'
            - '\ProgramData\'
            - '\Users\Public\'
        Image|endswith:
            - '\notepad.exe'
            - '\explorer.exe'
            - '\svchost.exe'
            - '\mspaint.exe'
            - '\calc.exe'
        CommandLine: ''
    condition: 1 of selection_*
falsepositives:
    - Legitimate penetration testing with Sliver framework (requires authorization context)
level: high
