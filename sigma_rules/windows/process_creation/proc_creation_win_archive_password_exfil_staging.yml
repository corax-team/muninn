title: Password-Protected Archive Creation for Exfiltration Staging
id: 3568a559-7d5a-4f26-bcb8-613a722015b9
status: stable
description: |
    Detects creation of password-protected archives using 7-Zip or RAR, commonly
    used by threat actors to stage data before exfiltration. Password protection
    prevents DLP inspection of archive contents. Volume splitting (-v flag) is
    used to break large archives into smaller chunks for easier upload.
references:
    - https://thedfirreport.com/2024/08/12/threat-actors-toolkit-leveraging-sliver-poshc2-batch-scripts/
    - https://attack.mitre.org/techniques/T1560/001/
author: Corax Security
date: 2026-03-30
tags:
    - attack.collection
    - attack.t1560.001
    - attack.exfiltration
    - attack.t1048
logsource:
    product: windows
    category: process_creation
detection:
    selection_7z_password:
        Image|endswith:
            - '\7z.exe'
            - '\7za.exe'
            - '\7zr.exe'
        CommandLine|contains:
            - ' -p'
            - ' -mhe'
    selection_rar_password:
        Image|endswith: '\rar.exe'
        CommandLine|contains:
            - ' -hp'
            - ' -p'
    selection_volume_split:
        CommandLine|contains:
            - ' -v'
    selection_staging_paths:
        CommandLine|contains:
            - '\Users\Public\'
            - '\ProgramData\'
            - '\Temp\'
            - '\Perflogs\'
    condition: (selection_7z_password or selection_rar_password) and (selection_volume_split or selection_staging_paths)
falsepositives:
    - Legitimate backup tools creating encrypted archives
    - Users creating password-protected archives for secure file sharing
level: high
