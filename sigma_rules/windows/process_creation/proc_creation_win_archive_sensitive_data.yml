title: Command-Line Archive Creation of Sensitive Directories
id: a1b2c3d4-0017-4000-a000-000000000017
status: experimental
description: |
    Detects command-line archive tools (rar, 7z, zip) being used to compress sensitive
    directories or files such as Desktop, Documents, Downloads, SSH keys, or email
    archives. This is a common data collection technique used by threat actors before
    exfiltration, where they stage compressed archives of valuable data for transfer
    to attacker-controlled infrastructure.
author: corax-team
date: 2025/01/01
tags:
    - attack.collection
    - attack.t1560.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_archive_tool:
        Image|endswith:
            - '\rar.exe'
            - '\7z.exe'
            - '\zip.exe'
    selection_add_flag:
        CommandLine|contains: ' a '
    selection_sensitive_target:
        CommandLine|contains:
            - '\Desktop'
            - '\Documents'
            - '\Downloads'
            - '\.ssh'
            - 'id_rsa'
            - '.pst'
            - '.ost'
            - '\Favorites'
            - 'ntds.dit'
            - 'SAM'
            - 'SYSTEM'
            - 'SECURITY'
    condition: selection_archive_tool and selection_add_flag and selection_sensitive_target
falsepositives:
    - Legitimate backup scripts archiving user directories
    - Data migration tools compressing user profiles
    - IT administrators creating backups of email archives
level: medium
