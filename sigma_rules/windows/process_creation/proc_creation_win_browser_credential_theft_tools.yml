title: Browser Credential Theft Tool Execution
id: 08fa58b2-3526-41af-89fc-b1108197c1c3
status: stable
description: |
    Detects execution of tools specifically designed to extract credentials,
    cookies, and autofill data from web browsers. These tools target the
    SQLite databases and encrypted credential stores of Chromium-based and
    Firefox browsers. Commonly used in ransomware intrusions and APT campaigns
    for credential harvesting before lateral movement.
references:
    - https://attack.mitre.org/techniques/T1555/003/
    - https://thedfirreport.com/2024/04/29/from-icedid-to-dagon-locker-ransomware-in-29-days/
author: Corax Security
date: 2026-03-30
tags:
    - attack.credential-access
    - attack.t1555.003
    - attack.t1539
logsource:
    product: windows
    category: process_creation
detection:
    selection_tools:
        CommandLine|contains:
            - 'SharpChrome'
            - 'SharpCookies'
            - 'SharpWeb'
            - 'hackbrowserdata'
            - 'HackBrowserData'
            - 'BrowserStealer'
            - 'ChromePass'
            - 'WebBrowserPassView'
            - 'browser-password-decryptor'
            - 'Invoke-BrowserCredentials'
            - 'ChromeKatz'
            - 'CookieKatz'
    selection_sharp_dpapi_browser:
        CommandLine|contains:
            - 'SharpDPAPI'
            - 'Seatbelt'
        CommandLine|contains:
            - 'chrome'
            - 'browser'
            - 'cookies'
            - 'logins'
    selection_direct_copy:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Login Data'
            - 'Cookies\\'
            - 'Web Data'
        CommandLine|contains:
            - 'copy'
            - 'Copy-Item'
            - 'xcopy'
            - 'robocopy'
    condition: 1 of selection_*
falsepositives:
    - Browser backup utilities
    - Authorized security assessments
level: high
