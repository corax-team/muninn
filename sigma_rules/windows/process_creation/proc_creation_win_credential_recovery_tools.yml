title: Password Recovery or Credential Dumping Tool Execution
id: a1b2c3d4-0009-4000-a000-000000000009
status: experimental
description: |
    Detects execution of known password recovery and credential dumping tools. These utilities
    extract stored credentials from browsers, email clients, network connections, and the
    operating system. Threat actors deploy these tools post-compromise to harvest credentials
    for lateral movement and further access.
author: corax-team
date: 2025/01/01
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1003
logsource:
    category: process_creation
    product: windows
detection:
    selection_tools:
        - Image|endswith:
              - '\WebBrowserPassView.exe'
              - '\ChromePass.exe'
              - '\netpass.exe'
              - '\netpass64.exe'
              - '\LaZagne.exe'
              - '\mimikatz.exe'
              - '\procdump.exe'
              - '\procdump64.exe'
        - OriginalFileName:
              - 'WebBrowserPassView.exe'
              - 'ChromePass.exe'
              - 'netpass.exe'
              - 'LaZagne.exe'
              - 'mimikatz.exe'
    selection_xenarmor:
        - Image|contains: 'XenArmor'
        - CommandLine|contains: 'XenArmor'
        - Image|endswith:
              - '\BrowserPasswordRecoveryPro.exe'
              - '\EmailPasswordRecoveryPro.exe'
              - '\NetworkPasswordRecoveryPro.exe'
    condition: selection_tools or selection_xenarmor
falsepositives:
    - Legitimate use of password recovery tools by IT administrators for account recovery
    - Security auditing and penetration testing activities
level: high
