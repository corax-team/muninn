title: NTLM Relay and Responder Attack Tools Execution
id: ee67a1bd-e7c2-4cc3-83ee-eb03d053b390
status: stable
description: |
    Detects execution of NTLM relay and LLMNR/NBT-NS poisoning tools commonly
    used for credential interception and relay attacks. These tools (Responder,
    Inveigh, ntlmrelayx, mitm6) are standard in red team and real-world
    attack toolkits for capturing NTLMv2 hashes and relaying authentication.
references:
    - https://attack.mitre.org/techniques/T1557/001/
    - https://www.thehacker.recipes/ad/movement/ntlm/relay
author: Corax Security
date: 2026-03-30
tags:
    - attack.credential-access
    - attack.t1557.001
    - attack.lateral-movement
    - attack.t1550.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_responder:
        CommandLine|contains:
            - 'Responder.py'
            - 'Responder.exe'
            - 'responder -I'
            - 'responder -i'
    selection_inveigh:
        CommandLine|contains:
            - 'Invoke-Inveigh'
            - 'Inveigh.exe'
            - 'InveighZero'
    selection_relay:
        CommandLine|contains:
            - 'ntlmrelayx'
            - 'smbrelayx'
            - 'krbrelayx'
            - 'mitm6'
            - 'PetitPotam'
            - 'Coercer'
    selection_python_relay:
        Image|endswith:
            - '\python.exe'
            - '\python3.exe'
        CommandLine|contains:
            - 'ntlmrelayx'
            - 'responder'
            - 'mitm6'
            - 'krbrelayx'
    condition: 1 of selection_*
falsepositives:
    - Authorized penetration testing
    - Security tool assessment
level: critical
