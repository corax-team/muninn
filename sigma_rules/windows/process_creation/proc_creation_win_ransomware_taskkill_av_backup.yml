title: Ransomware Pre-Encryption — Taskkill Targeting AV and Backup Processes
id: 7157dc44-f861-4df8-bbee-413d1af639b2
status: stable
description: |
    Detects taskkill commands targeting antivirus, backup, database, and office
    processes commonly killed by ransomware before encryption. The /f /im pattern
    with known process names is a strong pre-encryption indicator.
references:
    - https://www.sentinelone.com/labs/lockbit-3-0-update-unpacking-the-anti-analysis-techniques/
    - https://thedfirreport.com/2024/04/29/from-icedid-to-dagon-locker-ransomware-in-29-days/
author: Corax Security
date: 2026-03-30
tags:
    - attack.impact
    - attack.t1489
    - attack.defense-evasion
    - attack.t1562.001
logsource:
    product: windows
    category: process_creation
detection:
    selection_taskkill:
        Image|endswith: '\taskkill.exe'
        CommandLine|contains: '/f'
    selection_targets:
        CommandLine|contains:
            - 'sqlservr'
            - 'oracle'
            - 'ocssd'
            - 'dbsnmp'
            - 'synctime'
            - 'agntsvc'
            - 'isqlplussvc'
            - 'xfssvccon'
            - 'mydesktopservice'
            - 'ocautoupds'
            - 'encsvc'
            - 'firefox'
            - 'tbirdconfig'
            - 'mydesktopqos'
            - 'ocomm'
            - 'dbeng50'
            - 'sqbcoreservice'
            - 'excel'
            - 'infopath'
            - 'msaccess'
            - 'mspub'
            - 'onenote'
            - 'outlook'
            - 'powerpnt'
            - 'steam'
            - 'thebat'
            - 'thunderbird'
            - 'visio'
            - 'winword'
            - 'wordpad'
            - 'notepad'
            - 'bedbh'
            - 'vxmon'
            - 'benetns'
            - 'bengien'
            - 'pvlsvr'
            - 'beserver'
            - 'raw_agent_svc'
            - 'vsnapvss'
            - 'CagService'
    condition: selection_taskkill and selection_targets
falsepositives:
    - IT administration forcefully killing processes during troubleshooting
level: high
