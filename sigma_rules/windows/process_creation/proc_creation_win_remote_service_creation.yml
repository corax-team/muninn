title: Remote Service Creation Targeting Multiple Hosts
id: a1b2c3d4-0013-4000-a000-000000000013
status: experimental
description: |
    Detects the use of sc.exe or PsExec to create or execute services on remote systems.
    This is a common lateral movement technique where attackers use Windows service
    control manager or Sysinternals PsExec to deploy payloads across the network by
    creating services on remote hosts via SMB.
author: corax-team
date: 2025/01/01
tags:
    - attack.lateral_movement
    - attack.t1021.002
    - attack.t1569.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_sc_remote:
        Image|endswith: '\sc.exe'
        CommandLine|contains|all:
            - '\\'
            - 'create'
    selection_psexec_remote:
        Image|endswith:
            - '\PsExec.exe'
            - '\PsExec64.exe'
        CommandLine|contains: '\\'
    condition: selection_sc_remote or selection_psexec_remote
falsepositives:
    - Legitimate remote administration using sc.exe for service management
    - IT operations teams using PsExec for authorized remote maintenance
    - Software deployment systems using remote service installation
level: medium
