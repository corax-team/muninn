title: Script Interpreter Executing From User-Writable Directory
id: a1b2c3d4-0003-4000-a000-000000000003
status: experimental
description: |
    Detects a script interpreter (PowerShell, cmd, wscript, cscript, mshta) executing a script
    or command that references a user-writable directory such as Temp, AppData, ProgramData, or
    Public folders. Malware commonly stages payloads in these directories to bypass execution
    restrictions on protected paths.
author: corax-team
date: 2025/01/01
tags:
    - attack.execution
    - attack.t1059
logsource:
    category: process_creation
    product: windows
detection:
    selection_interpreter:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\cmd.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    selection_writable_path:
        CommandLine|contains:
            - '\AppData\Local\Temp\'
            - '\AppData\Roaming\'
            - '\ProgramData\'
            - '\Users\Public\'
            - '\Windows\Temp\'
    condition: selection_interpreter and selection_writable_path
falsepositives:
    - Legitimate scripts executing from user profile directories during software installation
    - System administration scripts stored in ProgramData
    - Software update mechanisms
level: medium
