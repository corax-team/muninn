title: Lateral Movement — Executable Staged via SMB Admin Share
id: d27c78ae-bb68-47c4-81fc-abc7a0964195
status: stable
description: |
    Detects file copy operations to remote admin shares (C$, ADMIN$, IPC$) that
    stage executables, scripts, or DLLs for lateral movement. Threat actors copy
    payloads to admin shares before executing them remotely via PsExec, WMI,
    scheduled tasks, or service creation.
references:
    - https://thedfirreport.com/2023/12/18/lets-opendir-some-presents-an-analysis-of-a-]]ransomware-artifact/
    - https://attack.mitre.org/techniques/T1021/002/
author: Corax Security
date: 2026-03-30
tags:
    - attack.lateral-movement
    - attack.t1021.002
    - attack.t1570
logsource:
    product: windows
    category: process_creation
detection:
    selection_copy_cmd:
        Image|endswith:
            - '\cmd.exe'
            - '\xcopy.exe'
            - '\robocopy.exe'
        CommandLine|contains:
            - 'copy '
            - 'xcopy '
            - 'robocopy '
    selection_copy_powershell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - 'Copy-Item'
            - 'cp '
            - 'move '
            - 'Move-Item'
    selection_admin_share:
        CommandLine|contains:
            - '$\\'
            - 'C$'
            - 'ADMIN$'
            - '\\\\*\C$'
    selection_payload:
        CommandLine|contains:
            - '.exe'
            - '.dll'
            - '.bat'
            - '.ps1'
            - '.vbs'
            - '.js'
            - '.hta'
    condition: (selection_copy_cmd or selection_copy_powershell) and selection_admin_share and selection_payload
falsepositives:
    - Legitimate software deployment via admin shares
    - SCCM or other endpoint management tools
level: high
