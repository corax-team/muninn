title: Registry Query for Virtualization Detection
id: a1b2c3d4-0007-4000-a000-000000000007
status: experimental
description: |
    Detects processes querying registry keys commonly used to detect virtualized environments.
    Malware and sandbox-aware threats check for VMware, VirtualBox, Hyper-V, and other
    hypervisor artifacts in the registry to evade analysis in virtual machines.
author: corax-team
date: 2025/01/01
tags:
    - attack.discovery
    - attack.t1082
    - attack.t1497.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_tool:
        Image|endswith:
            - '\reg.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_vm_keys:
        CommandLine|contains:
            - 'Disk\Enum'
            - 'DriverDesc'
            - 'SystemBiosVersion'
            - 'VideoBiosVersion'
            - 'VBOX'
            - 'VMware'
            - 'VirtualBox'
            - 'QEMU'
            - 'Red Hat VirtIO'
    condition: selection_tool and selection_vm_keys
falsepositives:
    - System inventory scripts querying hardware information
    - Virtualization management tools
    - IT asset management software
level: medium
