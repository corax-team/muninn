title: APT Head Mare - Credential Harvesting Tools Execution
id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
status: stable
description: |
    Detects execution of credential harvesting utilities used by Head Mare in their
    post-exploitation phase. XenAllPasswordPro is a password recovery tool dropped to
    C:\ProgramData\update\, while secretsdump and Mimikatz are used for AD credential
    extraction. All three tools were observed across multiple Head Mare intrusions.
references:
    - https://securelist.com/head-mare-hacktivists/113555/
    - https://securelist.com/head-mare-twelve-collaboration/115887/
author: Corax Security
date: 2026-03-27
tags:
    - attack.credential-access
    - attack.t1555
    - attack.t1003.002
    - attack.t1003.003
    - threat-actor.head-mare
logsource:
    product: windows
    category: process_creation
detection:
    selection_xenall:
        Image|endswith: '\XenAllPasswordPro.exe'
    selection_secretsdump:
        Image|endswith: '\secretsdump.exe'
        Image|contains: '\ProgramData\'
    selection_mimikatz_path:
        Image|contains: '\ProgramData\'
        Image|endswith: '\mimikatz.exe'
    condition: 1 of selection_*
falsepositives:
    - XenAllPasswordPro: IT administrators recovering passwords in break-glass scenarios (very rare)
    - secretsdump/mimikatz: Security assessments with prior approval
level: high
