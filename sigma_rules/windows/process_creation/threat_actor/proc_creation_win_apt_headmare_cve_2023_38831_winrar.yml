title: APT Head Mare - CVE-2023-38831 WinRAR Initial Access
id: e8b5c6d4-1f2a-7e9b-d24b-5a6f7e8b9c0d
status: stable
description: |
    Detects exploitation of CVE-2023-38831 (WinRAR arbitrary code execution) used by
    Head Mare as the primary initial access vector. The vulnerability causes WinRAR to
    execute code when a specially crafted archive is opened. Suspicious child processes
    of WinRAR (cmd, powershell, mshta, wscript, cscript) indicate active exploitation.
    Head Mare delivered the PhantomDL dropper via this technique.
references:
    - https://securelist.com/head-mare-hacktivists/113555/
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2023-38831
author: Corax Security
date: 2026-03-27
tags:
    - attack.initial-access
    - attack.t1566.001
    - attack.execution
    - attack.t1203
    - cve.2023-38831
    - threat-actor.head-mare
    - threat-actor.phantomcore
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith: '\WinRAR.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\mshta.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\regsvr32.exe'
            - '\rundll32.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate WinRAR SFX archives that run scripts post-extraction (rare)
level: high
