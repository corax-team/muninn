title: APT Head Mare - CVE-2024-43451 NTLM Hash Disclosure via URL File
id: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
status: stable
description: |
    Detects the Head Mare attack chain exploiting CVE-2024-43451 (Windows NTLM Hash
    Disclosure). The group delivers a ZIP archive with a .url file named to mimic a
    DOCX document (e.g., "Сопроводительное письмо.docx"). When the .url is opened,
    it coerces an SMB authentication to an attacker-controlled server, capturing the
    NTLM hash for relay or offline cracking. PhantomCore RAT is deployed post-auth.
    Delivery domain observed: document-file[.]ru (45.87.246.40).
references:
    - https://securelist.com/ntlm-abuse-in-2025/118132/
    - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2024-43451
author: Corax Security
date: 2026-03-27
tags:
    - attack.initial-access
    - attack.t1566.001
    - attack.credential-access
    - attack.t1187
    - attack.lateral-movement
    - attack.t1550.002
    - cve.2024-43451
    - threat-actor.head-mare
    - threat-actor.phantomcore
logsource:
    product: windows
    category: process_creation
detection:
    selection_url_exec:
        ParentImage|endswith:
            - '\explorer.exe'
            - '\winrar.exe'
            - '\7zFM.exe'
            - '\7z.exe'
        Image|endswith: '\rundll32.exe'
        CommandLine|contains: 'url.dll'
    selection_shell_url:
        ParentImage|endswith: '\explorer.exe'
        Image|endswith: '\svchost.exe'
        CommandLine|contains: 'WebClient'
    condition: 1 of selection_*
falsepositives:
    - rundll32 url.dll usage is uncommon; review parent process and destination URL
level: high
